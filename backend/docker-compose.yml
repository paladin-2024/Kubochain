services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kubochain
      POSTGRES_USER: kubochain
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubochain"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./fastapi_server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kubochain:${DB_PASSWORD}@db:5432/kubochain
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./fastapi_server/uploads:/app/uploads
      - ./fastapi_server/firebase-credentials.json:/app/firebase-credentials.json:ro

volumes:
  postgres_data:
