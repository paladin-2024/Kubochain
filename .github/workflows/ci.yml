name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Flutter: analyze + test ──────────────────────────────────────────────────
  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  # ── Backend: lint ────────────────────────────────────────────────────────────
  backend:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/fastapi_server/requirements.txt

      - name: Install dependencies
        working-directory: backend/fastapi_server
        run: pip install -r requirements.txt

      - name: Ruff lint
        working-directory: backend/fastapi_server
        run: ruff check app

      - name: Pytest
        working-directory: backend/fastapi_server
        run: pytest -q
