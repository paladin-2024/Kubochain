name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Flutter: analyze + test ──────────────────────────────────────────────────
  flutter:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

  # ── Backend: lint + test ─────────────────────────────────────────────────────
  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/fastapi_server/requirements.txt

      - name: Install dependencies
        working-directory: backend/fastapi_server
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        working-directory: backend/fastapi_server
        run: ruff check app

      - name: Pytest
        working-directory: backend/fastapi_server
        run: pytest -q

  # ── Deploy: runs only on push to main after both CI jobs pass ─────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [flutter, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            cd backend
            docker compose pull db
            docker compose up --build -d
            docker compose exec -T api alembic upgrade head
            echo "Deploy complete $(date)"
