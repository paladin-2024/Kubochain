name: kubochain
description: "KuboChain - Boda Ride-Hailing App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  smooth_page_indicator: ^1.2.1

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # Networking
  dio: ^5.7.0
  socket_io_client: ^2.0.3+1

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.3

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI Extras
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Notifications & Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/logo-1.png
    - assets/logo-2.png
    - assets/logo-light.png
    - assets/bg-1.png
    - assets/google.png
    - assets/onboarding1.png
    - assets/onboarding2.png
    - assets/onboarding3.png
