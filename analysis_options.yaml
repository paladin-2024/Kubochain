include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # withOpacity deprecated — migration is a separate task
    deprecated_member_use: ignore
    # Pre-existing style notices — not blocking CI
    unnecessary_import: ignore
    unnecessary_const: ignore
    unnecessary_string_interpolations: ignore
    library_prefixes: ignore
    curly_braces_in_flow_control_structures: ignore
    no_wildcard_variable_uses: ignore
    # Pre-existing async context issues — fix separately
    use_build_context_synchronously: ignore

linter:
  rules:
    # avoid_print: false
    # prefer_single_quotes: true
